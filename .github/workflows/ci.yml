name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint, Typecheck, Test, Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile
        # The `prepare` hook runs `panda codegen`, generating the styled-system/
        # directory required for typecheck and build.

      - name: Lint (Biome check)
        run: bun run check

      - name: Typecheck (tsc --noEmit)
        run: bun run typecheck

      # - name: Test (Vitest)
      #   run: bun run test

      # - name: Build (Vite)
      #   run: bun run build
        # DATABASE_URL is not required at build time.
        # Drizzle ORM connects at server runtime only.
